<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospect Research — Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>if(localStorage.getItem('darkMode')==='on')document.documentElement.classList.add('dark-mode');</script>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">Prospect<span>Research</span></div>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/tracker" class="nav-link active">Tracker</a>
    <a href="/review-later" class="nav-link">Review Later</a>
    <a href="/icp" class="nav-link">ICP Settings</a>
    <a href="/history" class="nav-link">History</a>
    <button class="dark-mode-toggle" id="darkToggle">Dark Mode</button>
  </nav>

  <main class="content">
    <header>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
          <h1>Tracker</h1>
          <p class="subtitle">Companies you're actively pursuing.</p>
        </div>
        <div style="display:flex;gap:8px">
          <button id="btnExportCSV" class="btn btn-secondary" style="white-space:nowrap;">Export CSV</button>
          <button id="btnScanATS" class="btn btn-primary" style="white-space:nowrap;">Scan ATS for New Roles</button>
        </div>
      </div>
    </header>
    <div id="atsScanResults" style="display:none;" class="card"></div>

    <div id="bullhornBar" class="bullhorn-bar">
      <div id="bhStatus"></div>
    </div>

    <div class="card filter-bar">
      <div class="filter-row">
        <div class="form-group filter-group filter-search">
          <label for="trackerSearch">Search</label>
          <input type="text" id="trackerSearch" placeholder="Company name...">
        </div>
        <div class="form-group filter-group">
          <label for="trackerSignalFilter">Signal</label>
          <select id="trackerSignalFilter">
            <option value="">All Signals</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group filter-group">
          <label for="trackerStepFilter">Step</label>
          <select id="trackerStepFilter">
            <option value="">All Steps</option>
          </select>
        </div>
        <div class="form-group filter-group">
          <label for="trackerSort">Sort</label>
          <select id="trackerSort">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="signal">Signal Strength</option>
            <option value="favorites">Favorites First</option>
          </select>
        </div>
      </div>
      <p id="trackerResultCount" class="result-count"></p>
    </div>

    <div id="trackerList" class="results-grid">
      <div class="empty-state"><p>Loading...</p></div>
    </div>
  </main>

  <script src="/js/theme.js"></script>
  <script src="/js/timezone-utils.js"></script>
  <script src="/js/tracker.js"></script>
</body>
</html>
