<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospect Research — Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>if(localStorage.getItem('darkMode')==='on')document.documentElement.classList.add('dark-mode');</script>
</head>
<body>
  <nav class="sidebar">
    <div class="logo">Prospect<span>Research</span></div>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/prospects" class="nav-link">Prospects</a>
    <a href="/tracker" class="nav-link active">Tracker</a>
    <a href="/icp" class="nav-link">ICP Settings</a>
    <a href="/history" class="nav-link">History</a>
    <button class="dark-mode-toggle" id="darkToggle">Dark Mode</button>
  </nav>

  <main class="content">
    <header>
      <h1>Tracker</h1>
      <p class="subtitle">Companies you're actively pursuing.</p>
    </header>

    <div id="bullhornBar" class="bullhorn-bar">
      <div id="bhStatus"></div>
      <div id="bhHelp" style="display:none;font-size:12px;color:var(--text-muted);margin-left:auto;">
        Tip: Drag this to your bookmarks bar → <a id="bhBookmarklet" href="#" style="background:#f57c00;color:#fff;padding:2px 8px;border-radius:3px;text-decoration:none;font-size:11px;cursor:grab;" draggable="true">Connect BH</a>
      </div>
    </div>

    <div class="card filter-bar">
      <div class="filter-row">
        <div class="form-group filter-group filter-search">
          <label for="trackerSearch">Search</label>
          <input type="text" id="trackerSearch" placeholder="Company name...">
        </div>
        <div class="form-group filter-group">
          <label for="trackerStepFilter">Step</label>
          <select id="trackerStepFilter">
            <option value="">All Steps</option>
          </select>
        </div>
      </div>
      <p id="trackerResultCount" class="result-count"></p>
    </div>

    <div id="trackerList" class="results-grid">
      <div class="empty-state"><p>Loading...</p></div>
    </div>
  </main>

  <script src="/js/theme.js"></script>
  <script src="/js/timezone-utils.js"></script>
  <script src="/js/tracker.js"></script>
</body>
</html>
